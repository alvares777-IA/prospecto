# ──────────────────────────────────────────────────────────────
# Prospecto-IA — VirtualHosts HTTP (porta 80)
# Deploy: copiar para /etc/httpd/conf.d/prospect.conf
# Após deploy: sudo certbot --apache -d n8n.prospect.rssc.com.br \
#   -d api.prospect.rssc.com.br -d bot.prospect.rssc.com.br \
#   -d builder.prospect.rssc.com.br
# Certbot adicionará os blocos :443 e os redirecionamentos HTTP→HTTPS
# ──────────────────────────────────────────────────────────────

# ── n8n — orquestrador de workflows ──────────────────────────
# Requer mod_proxy_wstunnel (verificar antes: httpd -M | grep wstunnel)
<VirtualHost *:80>
    ServerName n8n.prospect.rssc.com.br

    ProxyPreserveHost On

    # Libera path de validação do Certbot (não proxiar)
    ProxyPass /.well-known/ !

    # WebSocket — n8n usa conexão persistente na UI
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:5678/$1 [P,L]

    ProxyPass        / http://127.0.0.1:5678/
    ProxyPassReverse / http://127.0.0.1:5678/

    # Workflows longos — evita timeout do Apache interromper execuções
    ProxyTimeout 300

    ErrorLog  /var/log/httpd/n8n-error.log
    CustomLog /var/log/httpd/n8n-access.log combined
</VirtualHost>

# ── Evolution API — interface com o WhatsApp ─────────────────
<VirtualHost *:80>
    ServerName api.prospect.rssc.com.br

    ProxyPreserveHost On

    # Libera path de validação do Certbot (não proxiar)
    ProxyPass /.well-known/ !

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog  /var/log/httpd/evolution-error.log
    CustomLog /var/log/httpd/evolution-access.log combined
</VirtualHost>

# ── Typebot Viewer — chatbot público ─────────────────────────
<VirtualHost *:80>
    ServerName bot.prospect.rssc.com.br

    ProxyPreserveHost On

    # Libera path de validação do Certbot (não proxiar)
    ProxyPass /.well-known/ !

    # Next.js precisa saber que está atrás de HTTPS para gerar URLs corretas.
    # Certbot copiará este bloco para o VirtualHost :443.
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    ErrorLog  /var/log/httpd/typebot-viewer-error.log
    CustomLog /var/log/httpd/typebot-viewer-access.log combined
</VirtualHost>

# ── Typebot Builder — editor administrativo ───────────────────
# Acesso restrito por IP recomendado após o go-live.
# Para restringir: descomente as 3 linhas abaixo e ajuste o IP/range.
#   <Proxy *>
#       Require ip 203.0.113.0/24
#   </Proxy>
<VirtualHost *:80>
    ServerName builder.prospect.rssc.com.br

    ProxyPreserveHost On

    # Libera path de validação do Certbot (não proxiar)
    ProxyPass /.well-known/ !

    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog  /var/log/httpd/typebot-builder-error.log
    CustomLog /var/log/httpd/typebot-builder-access.log combined
</VirtualHost>
