# ──────────────────────────────────────────────────────────────
# Prospecto-IA — VirtualHosts HTTPS (porta 443)
# Deploy: copiar para /etc/httpd/conf.d/prospect-ssl.conf
# ──────────────────────────────────────────────────────────────

# ── n8n — orquestrador de workflows ──────────────────────────
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName n8n.prospect.rssc.com.br

    ProxyPreserveHost On

    # WebSocket — n8n usa conexão persistente na UI
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:5678/$1 [P,L]

    ProxyPass        / http://127.0.0.1:5678/
    ProxyPassReverse / http://127.0.0.1:5678/

    RequestHeader set X-Forwarded-Proto "https"
    ProxyTimeout 300

    ErrorLog  /var/log/httpd/n8n-error.log
    CustomLog /var/log/httpd/n8n-access.log combined

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/n8n.prospect.rssc.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/n8n.prospect.rssc.com.br/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

